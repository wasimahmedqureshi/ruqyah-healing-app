<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruqyah Healing App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🕌 Ruqyah Healing</h1>

<div class="tabs">

<button onclick="showPlayer()">Ruqyah</button>
<button onclick="showTasbeeh()">Tasbeeh</button>

</div>

<div id="player">

<h2 id="title"></h2>

<audio id="audio"></audio>

<button onclick="prev()">⏮</button>
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="next()">⏭</button>

<input type="range" id="progress">

</div>

<div id="tasbeeh" style="display:none">

<h2>Tasbeeh Counter</h2>

<h1 id="count">0</h1>

<button onclick="increase()">+1</button>
<button onclick="reset()">Reset</button>

</div>

<script src="script.js"></script>
<script src="tasbeeh.js"></script>

</body>

</html>
