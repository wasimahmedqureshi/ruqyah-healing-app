<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruqyah Healing</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🕌 Ruqyah Healing</h1>

<p>Islamic Ruqyah Protection Audio</p>

<div class="player">

<h2 id="title">Surah Fatiha</h2>

<audio id="audio"></audio>

<div class="controls">

<button onclick="prev()">⏮</button>
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="next()">⏭</button>

</div>

<input type="range" id="progress" value="0">

</div>

<ul id="playlist">

<li onclick="selectTrack(0)">Surah Fatiha</li>
<li onclick="selectTrack(1)">Ayatul Kursi</li>
<li onclick="selectTrack(2)">Surah Ikhlas</li>
<li onclick="selectTrack(3)">Surah Falaq</li>
<li onclick="selectTrack(4)">Surah Naas</li>

</ul>

<footer>

Developed by Vaseem Ahmad

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
